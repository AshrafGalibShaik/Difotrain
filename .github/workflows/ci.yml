name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (core + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run test suite
        run: python -m unittest discover -s tests -v

      - name: Smoke-test the CLI
        run: |
          difotrain info
          difotrain collect --out /tmp/ci_data --episodes 40 --steps 30
          difotrain train --data /tmp/ci_data --out /tmp/ci_runs/p.pt --epochs 20
          difotrain eval --policy /tmp/ci_runs/p.pt
